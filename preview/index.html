<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: #0d0d12;
    color: #ddd;
    min-height: 100vh;
    background-image: url('bg-logo.png');
    background-repeat: no-repeat;
    background-position: center center;
    background-attachment: fixed;
    background-size: 600px auto;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 40px 20px 20px;
    border-bottom: 1px solid #1e1e2a;
    background: linear-gradient(180deg, #0d0d12 0%, #111120 100%);
  }
  .header h1 {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: 6px;
  }
  .header h1 span { color: #ffd700; }
  .header .sub {
    color: #666;
    font-size: 14px;
    margin-top: 6px;
    letter-spacing: 2px;
  }
  .header .stats {
    margin-top: 14px;
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 13px;
  }
  .header .stats span {
    padding: 4px 14px;
    border-radius: 20px;
    background: #1a1a2a;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 18px 20px;
    flex-wrap: wrap;
    background: #0d0d12;
    border-bottom: 1px solid #1a1a28;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    background: rgba(13,13,18,0.92);
  }
  .filter-btn {
    padding: 6px 18px;
    border-radius: 20px;
    border: 1px solid #2a2a3a;
    background: transparent;
    color: #888;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .filter-btn:hover { border-color: #555; color: #ddd; }
  .filter-btn.active {
    background: #ffd700;
    color: #111;
    border-color: #ffd700;
    font-weight: 600;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 20px;
    padding: 24px;
    max-width: 1440px;
    margin: 0 auto;
  }

  /* CARD */
  .card {
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s;
    box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    cursor: default;
    opacity: 1;
    transform: scale(1);
    transition: all 0.3s ease;
  }
  .card.hidden {
    display: none;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  /* TERMINAL PREVIEW */
  .terminal {
    padding: 16px 18px 14px;
    font-family: 'Cascadia Code', 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12.5px;
    line-height: 1.65;
    min-height: 170px;
    position: relative;
  }
  .term-line { white-space: pre-wrap; word-break: break-all; }
  .term-line .dim { opacity: 0.45; }
  .spacer { height: 5px; }

  .status-bar {
    display: flex;
    justify-content: space-between;
    padding: 5px 18px;
    font-size: 10.5px;
    font-family: 'Segoe UI', sans-serif;
  }

  /* CARD FOOTER */
  .card-footer {
    padding: 14px 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card-footer .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-footer .name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .card-footer .tag {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 10px;
    font-weight: 500;
  }
  .tag-dark { background: #2a2a3a; color: #aaa; }
  .tag-light { background: #e8e0d8; color: #444; }
  .card-footer .desc {
    font-size: 12.5px;
    opacity: 0.6;
    letter-spacing: 0.5px;
  }
  .card-footer .actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .copy-btn {
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid currentColor;
    background: transparent;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .copy-btn:hover { opacity: 1; background: rgba(255,255,255,0.05); }
  .copy-btn.copied { opacity: 1; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    padding: 10px 28px;
    border-radius: 10px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.4s ease;
    pointer-events: none;
    z-index: 999;
    background: #2a2a3a;
    color: #ddd;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 30px 20px 40px;
    border-top: 1px solid #1e1e2a;
    color: #666;
    font-size: 13px;
    line-height: 1.8;

  .footer .star { color: #ffd700; }

  ::-webkit-scrollbar-track { background: #0d0d12; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }

  @media (max-width: 640px) {

    .header h1 { font-size: 24px; }

</style>

// ====================================================================
// GENERATE YAML
// ====================================================================
function genYaml(s) {
  const c = s.colors;
  const sp = s.spinner;
  const b = s.branding;
  return `name: ${s.id}
description: "${s.cat} — ${s.desc}"
colors:
  banner_border: "${c.banner_border}"
  banner_title: "${c.banner_title}"
  banner_accent: "${c.banner_accent}"
  banner_dim: "${c.banner_dim}"
  banner_text: "${c.banner_text}"
  ui_accent: "${c.ui_accent}"
  ui_label: "${c.ui_label}"
  ui_ok: "${c.ui_ok}"
  ui_error: "${c.ui_error}"
  ui_warn: "${c.ui_warn}"
  prompt: "${c.prompt}"
  input_rule: "${c.input_rule}"
  response_border: "${c.response_border}"
  status_bar_bg: "${c.status_bar_bg}"
  session_label: "${c.session_label}"
  session_border: "${c.session_border}"
spinner:
  waiting_faces:${sp.waiting.map(f => `\n    - "${f}"`).join('')}
  thinking_verbs:${sp.verbs.map(v => `\n    - "${v}"`).join('')}
branding:
  agent_name: "${b.agent}"
  welcome: "${b.welcome}"
  prompt_symbol: "${b.prompt}"
  response_label: "${b.label}"
tool_prefix: "┊"`;
}

// ====================================================================
// BUILD CARDS
// ====================================================================

  return {
    id: s.id,
    mode: s.mode,
    html: `
    <div class="card skin-${s.id}" data-mode="${s.mode}" data-id="${s.id}" style="background:${s.bg}">
      <div class="terminal" style="background:${s.bg}; color:${s.fg}">
        <div class="term-line"><span style="color:${c.banner_border}">╭─</span><span style="color:${c.banner_title}"> ✦ ${s.branding.agent} ✦ </span><span class="dim" style="color:${c.banner_dim}">v3.0  —  #${s.id.slice(0,4)}</span><span style="color:${c.banner_border}"> ─────────────────╮</span></div>
        <div class="term-line"><span style="color:${c.banner_border}">│</span><span style="color:${c.banner_accent}">  ╭──╮ ╭──╮ ╭──╮ ╭──╮ ╭──╮ ╭──╮</span><span class="dim" style="color:${c.banner_dim}">  ｜</span><span style="color:${c.banner_accent}">│</span></div>
        <div class="term-line"><span style="color:${c.banner_border}">│</span><span style="color:${c.banner_accent}">  ╰┬╯ │  │ │  │ │  │ │  │ │  │</span><span class="dim" style="color:${c.banner_dim}">  ${s.name}</span><span style="color:${c.banner_accent}">│</span></div>
        <div class="term-line"><span style="color:${c.banner_border}">│</span><span style="color:${c.banner_accent}">   ╯  ╰──╯ ╰──╯ ╰──╯ ╰──╯ ╰──╯</span><span class="dim" style="color:${c.banner_dim}">  ｜</span><span style="color:${c.banner_accent}">│</span></div>
        <div class="term-line"><span style="color:${c.banner_border}">╰──────────────────────────────────────╯</span></div>
        <div class="spacer"></div>
        <div class="term-line"><span style="color:${c.ui_ok}">✔</span><span class="dim" style="color:${c.banner_dim}"> 模型: deepseek-v4  ·  tools: 14  ·  记忆: 载入</span></div>
        <div class="spacer"></div>
        <div class="term-line"><span style="color:${c.banner_border}">┃</span></div>
        <div class="term-line"><span style="color:${c.prompt}">${s.branding.prompt}</span> 帮我查一下今天的行情</div>
        <div class="spacer"></div>
        <div class="term-line"><span style="color:${c.response_border}">╭─</span><span style="color:${c.ui_accent}"> ${s.branding.label}</span><span class="dim" style="color:${c.banner_dim}"> @ 2026-06-03</span><span style="color:${c.response_border}"> ───────────────╮</span></div>
        <div class="term-line"><span style="color:${c.response_border}">│</span><span style="color:${c.banner_text}">  上证 3342  <span style="color:${c.ui_ok}">+1.23%</span>  ·  深证 10524  <span style="color:${c.ui_ok}">+0.87%</span></span><span style="color:${c.response_border}">│</span></div>
        <div class="term-line"><span style="color:${c.response_border}">│</span><span style="color:${c.banner_text}">  成交额 8942 亿  ·  北向 <span style="color:${c.ui_ok}">+28.6 亿</span></span><span style="color:${c.response_border}">│</span></div>
        <div class="term-line"><span style="color:${c.response_border}">╰────────────────────────────────╯</span></div>
        <div class="spacer"></div>
        <div class="term-line"><span style="color:${c.prompt}">${s.branding.prompt}</span> <span class="dim" style="color:${c.banner_dim}">正在等待输入...</span></div>
      </div>
      <div class="status-bar" style="background:${c.status_bar_bg}; color:${c.banner_dim}">
        <div class="status-left"><span style="color:${c.session_label}">${s.branding.agent}</span><span style="color:${c.ui_ok}"> ● 在线</span><span>14 tools</span></div>
        <div class="status-right">tok: 1.8k  |  0.03s</div>
      </div>
      <div class="card-footer" style="background:${s.bg}; border-top:1px solid ${isDark ? '#1e1e2e' : '#e8e0e0'}">
        <div class="meta">
          <span class="name" style="color:${c.ui_accent}">${s.name}</span>
          <span class="tag ${isDark ? 'tag-dark' : 'tag-light'}">${isDark ? '🌙 深色' : '☀ 浅色'}</span>
        </div>
        <div class="desc" style="color:${isDark ? '#888' : '#666'}">${s.cat} — ${s.desc}</div>
        <div class="actions">
          <button class="copy-btn" style="color:${c.ui_accent}" onclick="copySkin('${s.id}')">
            📋 复制 YAML 配置

      </div>
    </div>`
  };
}

// ====================================================================
// RENDER
// ====================================================================
const grid = document.getElementById('grid');
SKINS.forEach(s => grid.innerHTML += buildCard(s).html);

// Update counts
document.getElementById('darkCount').textContent = SKINS.filter(s => s.mode === 'dark').length;
document.getElementById('lightCount').textContent = SKINS.filter(s => s.mode === 'light').length;
document.getElementById('totalCount').textContent = SKINS.length;

// ====================================================================
// COPY TOAST
// ====================================================================
function copySkin(id) {
  const s = SKINS.find(x => x.id === id);
  const yaml = genYaml(s);
  navigator.clipboard.writeText(yaml).then(() => {
    const toast = document.getElementById('toast');
    toast.textContent = `✅ 「${s.name}」YAML 已复制！保存为 ~/.hermes/skins/${s.id}.yaml 即可使用`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
    // Flash button
    const btns = document.querySelectorAll(`[data-id="${id}"] .copy-btn`);
    btns.forEach(b => {
      b.textContent = '✅ 已复制!';
      b.classList.add('copied');
      setTimeout(() => { b.textContent = '📋 复制 YAML 配置'; b.classList.remove('copied'); }, 2000);
    });
  });
}

// ====================================================================
// FILTER
// ====================================================================
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;
    document.querySelectorAll('.card').forEach(card => {
      if (filter === 'all') card.classList.remove('hidden');
      else card.classList.toggle('hidden', card.dataset.mode !== filter);
    });
  });
});
